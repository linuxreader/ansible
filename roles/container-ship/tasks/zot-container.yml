- name: Allow HTTP traffic on port 5000
  ansible.posix.firewalld:
    port: "5000/tcp"
    permanent: true
    state: enabled
    immediate: true
  notify: Reload firewalld

- name: Add zot image quadlet
  template:
    src: zot_container_image.j2
    dest: /etc/containers/systemd/users/{{ podman_user }}/zot.image
  notify: daemon reload

- name: Add zot quadlet file
  template:
    src: zot_container.j2
    dest: /etc/containers/systemd/users/{{ podman_user }}/zot.container
  notify: daemon reload

- name: create zot config directory 
  file:
    path: "/home/{{ podman_user }}/zot"
    state: directory
    owner: "{{ podman_user }}"
    mode: '0750'

- name: copy zot config file to host
  template:
    src: zot_config.j2
    dest: /home/{{ podman_user }}/zot/config.json
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: '0644'

- name: copy htpasswd to host
  copy:
    src: zot-htpasswd
    dest: /home/{{ podman_user }}/zot/htpasswd
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: '0644'

- name: reload daemon
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"

- name: Run and enable zot container
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd_service:
    name: "zot.service"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"

- name: Create backup directory for podman volume exports
  file:
    path: "{{ podman_backup_dir | default('/home/' + podman_user + '/backups/registry') }}"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: '0750'
 
- name: Set up weekly cron job to back up podman volumes
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.cron:
    name: "Weekly podman volume backup - registry"
    weekday: "0"
    hour: "2"
    minute: "0"
    job: >-
      BACKUP_DIR="{{ podman_backup_dir | default('/home/' + podman_user + '/backups/registry') }}" &&
      DATE=$(date +\%Y-\%m-\%d) &&
      podman volume export zot
      --output "${BACKUP_DIR}/registry_${DATE}.tar"
    state: present
 
- name: Set up weekly cron job to delete backups older than 3 months
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.cron:
    name: "Weekly podman backup cleanup - registry"
    weekday: "0"
    hour: "3"
    minute: "0"
    job: >-
      find "{{ podman_backup_dir | default('/home/' + podman_user + '/backups/registry') }}"
      -name "registry-*.tar"
      -mtime +90
      -delete
    state: present

- name: Enable podman auto-update timer
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd_service:
    name: podman-auto-update.timer
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"
