- block:
  - name: Allow {{ it_tools_port }} on the firewall
    ansible.posix.firewalld:
      port: "{{ it_tools_port }}/tcp"
      permanent: true
      state: enabled
      immediate: true

  - name: Pull it-tools container image
    containers.podman.podman_image:
      name: "{{ it_tools_container_image }}"
      state: present
    become_user: "{{ podman_user }}"

  - name: Add the quadlet file
    template:
      src: it-tools.j2
      dest: /etc/containers/systemd/users/{{ podman_user }}/it-tools.container
    notify: daemon reload

  - name: daemon reload
    become: true
    become_user: "{{ podman_user }}"
    ansible.builtin.systemd_service:
      daemon_reload: true
      scope: user
    environment:
      XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"

  - name: Run Quadlet
    become: true
    become_user: "{{ podman_user }}"
    ansible.builtin.systemd_service:
      name: it-tools.service
      state: restarted
      enabled: true
      scope: user
    environment:
      XDG_RUNTIME_DIR: "/run/user/{{ podman_user_uid }}"

  when: it_tools_container
  tags: it_tools_container
